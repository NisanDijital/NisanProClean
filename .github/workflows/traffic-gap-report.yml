name: Traffic Gap Report

on:
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * *"

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GSC_SITE_DOMAIN: nisankoltukyikama.com
      TRAFFIC_REPORT_DAYS: 7
      GSC_CLIENT_ID: ${{ secrets.GSC_CLIENT_ID }}
      GSC_CLIENT_SECRET: ${{ secrets.GSC_CLIENT_SECRET }}
      GSC_REFRESH_TOKEN: ${{ secrets.GSC_REFRESH_TOKEN }}
      CLARITY_EXPORT_TOKEN: ${{ secrets.CLARITY_EXPORT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate traffic gap report
        run: npm run -s traffic:gap

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: traffic-gap-report
          path: reports/traffic-gap-*
