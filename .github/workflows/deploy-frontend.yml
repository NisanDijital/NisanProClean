name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run -s lint

      - name: Build
        run: npm run -s build

      - name: Prepare deploy bundle
        run: |
          rm -rf .deploy
          mkdir -p .deploy
          cp -r dist/* .deploy/
          cp backend/api.php .deploy/api.php
          cp backend/admin.html .deploy/admin.html
          if [ -f .htaccess ]; then cp .htaccess .deploy/.htaccess; fi

      - name: Deploy via FTP (attempt 1)
        id: ftp_deploy_1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./.deploy/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          timeout: 180000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**

      - name: Deploy via FTP (retry on timeout)
        if: steps.ftp_deploy_1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./.deploy/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          timeout: 180000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**

      - name: Verify deployed frontend asset
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('.deploy/index.html', 'utf8');
          const match = html.match(/\/assets\/index-[^"']+\.js/);
          if (!match) throw new Error('main asset not found in deploy html');
          const assetUrl = `https://nisankoltukyikama.com${match[0]}`;
          (async () => {
            const res = await fetch(assetUrl, { cache: 'no-store' });
            if (!res.ok) throw new Error(`deployed asset missing: ${res.status} ${assetUrl}`);
            console.log(`deployed asset ok: ${assetUrl}`);
          })();
          NODE

      - name: Submit sitemap to Google Search Console (optional)
        env:
          GSC_SITE_DOMAIN: nisankoltukyikama.com
          SITEMAP_URL: https://nisankoltukyikama.com/sitemap.xml
          GSC_CLIENT_ID: ${{ secrets.GSC_CLIENT_ID }}
          GSC_CLIENT_SECRET: ${{ secrets.GSC_CLIENT_SECRET }}
          GSC_REFRESH_TOKEN: ${{ secrets.GSC_REFRESH_TOKEN }}
        run: node ./scripts/gsc-submit-sitemap-api.mjs

      - name: Post-deploy index health check
        run: npm run -s index:health

      - name: Upload index health reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: index-health-report
          path: reports/index-health/
